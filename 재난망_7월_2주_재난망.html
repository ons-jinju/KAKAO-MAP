<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>7월 2주 재난망 재난망 지도</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
    #header {
      background: linear-gradient(135deg,#bf360c,#e64a19);
      color:white; padding:12px 16px;
      display:flex; align-items:center; gap:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.3);
    }
    #header h1 { font-size:16px; font-weight:bold; flex:1; }
    #progress-badge {
      background:rgba(255,255,255,0.2);
      border-radius:12px; padding:3px 10px; font-size:12px; white-space:nowrap;
    }
    #toolbar {
      background:white; padding:8px 12px;
      display:flex; gap:8px; align-items:center;
      border-bottom:1px solid #e0e0e0;
    }
    #search-input {
      flex:1; padding:8px 14px;
      border:1.5px solid #ffccbc; border-radius:20px;
      font-size:14px; outline:none;
    }
    #search-input:focus { border-color:#e64a19; }
    #btn-fit {
      background:#e64a19; color:white; border:none;
      border-radius:16px; padding:8px 12px;
      font-size:13px; cursor:pointer; white-space:nowrap;
    }
    #app-container { display:flex; height:calc(100vh - 108px); }
    #map { flex:1; height:100%; }
    #side-panel {
      width:300px; background:white;
      border-left:1px solid #e0e0e0;
      overflow-y:auto; display:flex; flex-direction:column;
    }
    .side-header {
      padding:10px 14px; background:#fbe9e7;
      font-size:12px; font-weight:bold; color:#bf360c;
      position:sticky; top:0; z-index:1;
    }
    .side-item {
      padding:10px 14px; border-bottom:1px solid #f0f0f0;
      cursor:pointer; transition:background 0.15s;
      display:flex; align-items:center; gap:8px;
    }
    .side-item:hover { background:#fbe9e7; }
    .side-item.done { background:#f1fdf4; }
    .si-text { flex:1; }
    .si-name { font-size:13px; font-weight:bold; color:#bf360c; word-break:break-all; }
    .si-name.done { color:#888; text-decoration:line-through; }
    .si-addr { font-size:11px; color:#888; margin-top:2px; }
    .si-check { font-size:18px; }
    @media(max-width:767px) {
      #side-panel { display:none; }
      #map { height:calc(100vh - 108px); width:100%; }
    }
    .popup-name { font-size:13px; font-weight:bold; color:#bf360c; margin-bottom:4px; word-break:break-all; }
    .popup-addr { font-size:12px; color:#555; margin-bottom:8px; }
    .popup-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .popup-btn {
      flex:1; padding:7px 4px; border-radius:6px;
      font-size:12px; font-weight:bold;
      text-decoration:none; text-align:center; display:block;
      cursor:pointer; border:none;
    }
    .btn-nav { background:#FFCD00; color:#333; }
    .btn-view { background:#bf360c; color:white; }
    .btn-done { background:#2e7d32; color:white; width:100%; margin-top:4px; }
    .btn-undone { background:#e0e0e0; color:#555; width:100%; margin-top:4px; }
  </style>
</head>
<body>
<div id="header">
  <span style="font-size:18px">🚨</span>
  <h1>7월 2주 재난망 재난망</h1>
  <a href="./index.html" style="color:rgba(255,255,255,0.8);text-decoration:none;font-size:13px;white-space:nowrap;">← 목록</a>
  <div id="progress-badge">완료 0/40</div>
</div>
<div id="toolbar">
  <input id="search-input" type="search" placeholder="호출명칭 또는 주소 검색..." oninput="filterMarkers(this.value)">
  <button id="btn-fit" onclick="fitAll()">전체보기</button>
</div>
<div id="app-container">
  <div id="map"></div>
  <div id="side-panel">
    <div class="side-header" id="side-header">목록 (40)</div>
    <div id="side-list"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var STATIONS = [{"name": "재난안전_경남_거창가지2-PS-RU", "lat": 35.7027317985992, "lng": 127.893342598688, "origAddr": "경상남도 거창군 거창읍 가지리 1454-1"}, {"name": "재난안전_경남_거창지산2-PS-RU", "lat": 35.663623240723, "lng": 127.995884433337, "origAddr": "경상남도 거창군 남하면 지산리 1909-1"}, {"name": "재난안전_경남_거창내오-PS-RU", "lat": 35.7688949165554, "lng": 127.895044348383, "origAddr": "경상남도 거창군 주상면 내오리 800"}, {"name": "재난안전_경남_거창해평-PS-RU", "lat": 35.7758297189203, "lng": 127.980905684811, "origAddr": "경상남도 거창군 가북면 추동길 68-34"}, {"name": "재난안전_경남_거창중촌5-PS-RU", "lat": 35.7981185077666, "lng": 127.974956736409, "origAddr": "경상남도 거창군 가북면 해평리 산37-1"}, {"name": "재난안전_경남_거창성기-PS-RU", "lat": 35.7753578940037, "lng": 127.922443432055, "origAddr": "경상남도 거창군 주상면 성기리 350"}, {"name": "재난안전_경남_거창해평3-PS-RU", "lat": 35.7603938148086, "lng": 127.982414521928, "origAddr": "경상남도 거창군 가북면 해평리 348-1"}, {"name": "재난안전_경남_거창주상-PS-RU", "lat": 35.7473035959616, "lng": 127.912971219943, "origAddr": "경상남도 거창군 주상면 도평리 1186"}, {"name": "재난안전_경남_거창월계-PS-RU", "lat": 35.7136551443734, "lng": 127.853923713427, "origAddr": "경상남도 거창군 마리면 빼재로 155"}, {"name": "재난안전_경남_거창위천남산-PS-RU", "lat": 35.7324889213043, "lng": 127.85422199959, "origAddr": "경상남도 거창군 마리면 율리 949-7"}, {"name": "재난안전_경남_거창고학-PS-RU", "lat": 35.6800385118606, "lng": 127.83341430428, "origAddr": "경상남도 거창군 마리면 고학리 231-1"}, {"name": "재난안전_경남_거창용산4-PS-RU", "lat": 35.7535092992048, "lng": 127.984381021414, "origAddr": "경상남도 거창군 가북면 용산리 989-10"}, {"name": "재난안전_경남_거창대야2-PS-RU", "lat": 35.6327899279787, "lng": 127.991076638872, "origAddr": "경상남도 거창군 남하면 대야리 산113"}, {"name": "재난안전_경남_거창3-PS-RU", "lat": 35.6904346766262, "lng": 127.915190488404, "origAddr": "경상남도 거창군 거창읍 거창대로 100"}, {"name": "재난안전_경남_거창IC-PS-RU", "lat": 35.6761347410207, "lng": 127.934209110252, "origAddr": "경상남도 거창군 거창읍 정장리 381-1"}, {"name": "재난안전_경남_거창한들파크-PS-RU", "lat": 35.6842478960548, "lng": 127.921830528463, "origAddr": "경상남도 거창군 거창읍 대평리 1497-5"}, {"name": "재난안전_경남_거창상림5-PS-RU", "lat": 35.6853426148107, "lng": 127.903874999771, "origAddr": "경상남도 거창군 거창읍 상림리 231-1"}, {"name": "재난안전_경남_거창중촌2-PS-RU", "lat": 35.8258512360643, "lng": 127.97016677401, "origAddr": "경상남도 거창군 가북면 중촌리 949-1"}, {"name": "재난안전_경남_거창개화-PS-RU", "lat": 35.7059569266138, "lng": 127.910678757852, "origAddr": "경상남도 거창군 거창읍 가지리 산26-8"}, {"name": "재난안전_경남_거창서변-PS-RU", "lat": 35.722188595256, "lng": 127.919723503178, "origAddr": "경상남도 거창군 거창읍 서변리 1161-1"}, {"name": "재난안전_경남_거창양평3-PS-RU", "lat": 35.7000088869235, "lng": 127.942593130501, "origAddr": "경상남도 거창군 남하면 둔마리 산6-1"}, {"name": "재난안전_경남_거창지산4-PS-RU", "lat": 35.6624272001705, "lng": 127.977961715278, "origAddr": "경상남도 거창군 남하면 지산리 산181-2"}, {"name": "재난안전_경남_거창영승-PS-RU", "lat": 35.6937945094344, "lng": 127.867855901634, "origAddr": "경상남도 거창군 마리면 영승리 560-5"}, {"name": "재난안전_경남_거창학리-PS-ICS", "lat": 35.7290055782858, "lng": 127.929023431332, "origAddr": "경상남도 거창군 거창읍 학리 119-1"}, {"name": "재난안전_경남_거창오류동마을-PS-ICS", "lat": 35.7824815800949, "lng": 127.887682877301, "origAddr": "경상남도 거창군 주상면 내오리 679"}, {"name": "재난안전_경남_거창고학3-PS-ICS", "lat": 35.6705180070841, "lng": 127.827710748051, "origAddr": "경상남도 거창군 마리면 고학리 84-3"}, {"name": "재난안전_경남_거창말흘-PS-ICS", "lat": 35.6956491548965, "lng": 127.850320338709, "origAddr": "경상남도 거창군 마리면 말흘리 484"}, {"name": "재난안전_경남_거창상림4-PS-RU", "lat": 35.6879872511463, "lng": 127.890132132196, "origAddr": "경상남도 거창군 거창읍 상림리 674-2"}, {"name": "재난안전_경남_거창군암3-PS-RU", "lat": 35.8291236124803, "lng": 127.916045817222, "origAddr": "경상남도 거창군 웅양면 군암리 1328"}, {"name": "재난안전_경남_거창산포3-PS-RU", "lat": 35.8365457978025, "lng": 127.932591556868, "origAddr": "경상남도 거창군 웅양면 산포리 산261-37"}, {"name": "재난안전_경남_거창웅양2-PS-RU", "lat": 35.8668432960139, "lng": 127.913357026032, "origAddr": "경상남도 거창군 웅양면 신촌리 348-15"}, {"name": "재난안전_경남_거창군암2-PS-RU", "lat": 35.846060408537, "lng": 127.908573490928, "origAddr": "경상남도 거창군 웅양면 군암리 462-1"}, {"name": "재난안전_경남_거창웅양-PS-RU", "lat": 35.7937496993072, "lng": 127.930434807638, "origAddr": "경상남도 거창군 웅양면 동호리 222-2"}, {"name": "재난안전_경남_거창정장3-PS-RU", "lat": 35.6601526895985, "lng": 127.913737163657, "origAddr": "경상남도 거창군 거창읍 수남로 2024-15"}, {"name": "재난안전_경남_거창소만주공-PS-RU", "lat": 35.6949041930949, "lng": 127.922971123466, "origAddr": "경상남도 거창군 거창읍 대동리 991"}, {"name": "재난안전_경남_거창동변2-PS-RU", "lat": 35.7311127929126, "lng": 127.9058890407, "origAddr": "경상남도 거창군 거창읍 동변리 산1-1"}, {"name": "재난안전_경남_거창웅양산포-PS-RU", "lat": 35.8154185833579, "lng": 127.925075090023, "origAddr": "경상남도 거창군 웅양면 산포리 2014"}, {"name": "재난안전_경남_거창소만주공-PS-ICS", "lat": 35.7021960289471, "lng": 127.932421136068, "origAddr": "경상남도 거창군 거창읍 양평리 1242"}, {"name": "재난안전_경남_거창죽림-PS-ICS", "lat": 35.7853389528996, "lng": 127.915825063305, "origAddr": "경상남도 거창군 웅양면 죽림리 413-1"}, {"name": "재난안전_경남_거창동변3-PS-ICS", "lat": 35.7261237606366, "lng": 127.899624851587, "origAddr": "경상남도 거창군 거창읍 동변리 산144-1"}];
var STORAGE_KEY = '재난망_7월_2주_재난망_done';
var total = STATIONS.length;

var map = L.map('map').setView([35.73511, 127.91851], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

function makeIcon(done) {
  var bg = done ? '#2e7d32' : '#bf360c';
  var emoji = done ? '✅' : '🚨';
  return L.divIcon({
    className: '',
    html: '<div style="background:' + bg + ';color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.4);border:2px solid white;">' + emoji + '</div>',
    iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-15]
  });
}

var doneSet = {};
try { doneSet = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}

function saveDone() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(doneSet)); } catch(e) {}
  updateProgress();
}

function updateProgress() {
  var cnt = Object.keys(doneSet).filter(function(k){ return doneSet[k]; }).length;
  document.getElementById('progress-badge').textContent = '완료 ' + cnt + '/' + total;
}

var markers = [];

STATIONS.forEach(function(s, idx) {
  var done = !!doneSet[idx];
  var m = L.marker([s.lat, s.lng], {icon: makeIcon(done)}).addTo(map);

  function buildPopup() {
    var isDone = !!doneSet[idx];
    var enc = encodeURIComponent(s.name);
    var navUrl = 'https://map.kakao.com/link/to/' + enc + ',' + s.lat + ',' + s.lng;
    var viewUrl = 'https://map.kakao.com/link/map/' + enc + ',' + s.lat + ',' + s.lng;
    var doneBtn = isDone
      ? '<button class="popup-btn btn-undone" onclick="toggleDone(' + idx + ')">↩️ 완료 취소</button>'
      : '<button class="popup-btn btn-done" onclick="toggleDone(' + idx + ')">✅ 완료</button>';
    return '<div class="popup-name">' + (isDone ? '✅ ' : '🚨 ') + s.name + '</div>' +
      '<div class="popup-addr">📌 ' + s.origAddr + '</div>' +
      '<div class="popup-btns">' +
      '<a class="popup-btn btn-nav" href="' + navUrl + '" target="_blank">🚗 경로안내</a>' +
      '<a class="popup-btn btn-view" href="' + viewUrl + '" target="_blank">🗺️ 지도보기</a>' +
      '</div>' + doneBtn;
  }

  m.bindPopup(buildPopup, {maxWidth:270});
  markers.push({marker:m, station:s, visible:true, idx:idx});
});

window.toggleDone = function(idx) {
  doneSet[idx] = !doneSet[idx];
  saveDone();
  var e = markers[idx];
  e.marker.setIcon(makeIcon(!!doneSet[idx]));
  e.marker.openPopup();
  renderSideList(markers.filter(function(x){ return x.visible; }));
};

updateProgress();

function fitAll() {
  var v = markers.filter(function(e){ return e.visible; });
  if (!v.length) return;
  map.fitBounds(L.featureGroup(v.map(function(e){ return e.marker; })).getBounds().pad(0.1));
}
fitAll();

function filterMarkers(kw) {
  kw = kw.trim().toLowerCase();
  var shown = [];
  markers.forEach(function(e) {
    var m = !kw || e.station.name.toLowerCase().indexOf(kw)>=0 || e.station.origAddr.toLowerCase().indexOf(kw)>=0;
    e.visible = m;
    if (m) { e.marker.addTo(map); shown.push(e); } else map.removeLayer(e.marker);
  });
  renderSideList(shown);
  if (kw && shown.length) fitAll();
}

function renderSideList(list) {
  document.getElementById('side-header').textContent = '목록 (' + list.length + ')';
  var sl = document.getElementById('side-list');
  sl.innerHTML = '';
  list.forEach(function(e) {
    var isDone = !!doneSet[e.idx];
    var d = document.createElement('div');
    d.className = 'side-item' + (isDone ? ' done' : '');
    d.innerHTML =
      '<div class="si-check">' + (isDone ? '✅' : '⬜') + '</div>' +
      '<div class="si-text">' +
        '<div class="si-name' + (isDone ? ' done' : '') + '">' + e.station.name + '</div>' +
        '<div class="si-addr">' + e.station.origAddr + '</div>' +
      '</div>';
    d.onclick = function() { map.setView([e.station.lat, e.station.lng], 17); e.marker.openPopup(); };
    sl.appendChild(d);
  });
}
renderSideList(markers);
</script>
</body>
</html>
