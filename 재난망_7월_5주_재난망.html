<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>7월 5주 재난망 재난망 지도</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
    #header {
      background: linear-gradient(135deg,#bf360c,#e64a19);
      color:white; padding:12px 16px;
      display:flex; align-items:center; gap:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.3);
    }
    #header h1 { font-size:16px; font-weight:bold; flex:1; }
    #progress-badge {
      background:rgba(255,255,255,0.2);
      border-radius:12px; padding:3px 10px; font-size:12px; white-space:nowrap;
    }
    #toolbar {
      background:white; padding:8px 12px;
      display:flex; gap:8px; align-items:center;
      border-bottom:1px solid #e0e0e0;
    }
    #search-input {
      flex:1; padding:8px 14px;
      border:1.5px solid #ffccbc; border-radius:20px;
      font-size:14px; outline:none;
    }
    #search-input:focus { border-color:#e64a19; }
    #btn-fit {
      background:#e64a19; color:white; border:none;
      border-radius:16px; padding:8px 12px;
      font-size:13px; cursor:pointer; white-space:nowrap;
    }
    #app-container { display:flex; height:calc(100vh - 108px); }
    #map { flex:1; height:100%; }
    #side-panel {
      width:300px; background:white;
      border-left:1px solid #e0e0e0;
      overflow-y:auto; display:flex; flex-direction:column;
    }
    .side-header {
      padding:10px 14px; background:#fbe9e7;
      font-size:12px; font-weight:bold; color:#bf360c;
      position:sticky; top:0; z-index:1;
    }
    .side-item {
      padding:10px 14px; border-bottom:1px solid #f0f0f0;
      cursor:pointer; transition:background 0.15s;
      display:flex; align-items:center; gap:8px;
    }
    .side-item:hover { background:#fbe9e7; }
    .side-item.done { background:#f1fdf4; }
    .si-text { flex:1; }
    .si-name { font-size:13px; font-weight:bold; color:#bf360c; word-break:break-all; }
    .si-name.done { color:#888; text-decoration:line-through; }
    .si-addr { font-size:11px; color:#888; margin-top:2px; }
    .si-check { font-size:18px; }
    @media(max-width:767px) {
      #side-panel { display:none; }
      #map { height:calc(100vh - 108px); width:100%; }
    }
    .popup-name { font-size:13px; font-weight:bold; color:#bf360c; margin-bottom:4px; word-break:break-all; }
    .popup-addr { font-size:12px; color:#555; margin-bottom:8px; }
    .popup-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .popup-btn {
      flex:1; padding:7px 4px; border-radius:6px;
      font-size:12px; font-weight:bold;
      text-decoration:none; text-align:center; display:block;
      cursor:pointer; border:none;
    }
    .btn-nav { background:#FFCD00; color:#333; }
    .btn-view { background:#bf360c; color:white; }
    .btn-done { background:#2e7d32; color:white; width:100%; margin-top:4px; }
    .btn-undone { background:#e0e0e0; color:#555; width:100%; margin-top:4px; }
  </style>
</head>
<body>
<div id="header">
  <span style="font-size:18px">🚨</span>
  <h1>7월 5주 재난망 재난망</h1>
  <a href="./index.html" style="color:rgba(255,255,255,0.8);text-decoration:none;font-size:13px;white-space:nowrap;">← 목록</a>
  <div id="progress-badge">완료 0/40</div>
</div>
<div id="toolbar">
  <input id="search-input" type="search" placeholder="호출명칭 또는 주소 검색..." oninput="filterMarkers(this.value)">
  <button id="btn-fit" onclick="fitAll()">전체보기</button>
</div>
<div id="app-container">
  <div id="map"></div>
  <div id="side-panel">
    <div class="side-header" id="side-header">목록 (40)</div>
    <div id="side-list"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var STATIONS = [{"name": "재난안전_경남_함양강청-PS-RU", "lat": 35.3580878164425, "lng": 127.679152125739, "origAddr": "경상남도 함양군 마천면 강청리 147-3"}, {"name": "재난안전_경남_함양강청3-PS-RU", "lat": 35.370139384066, "lng": 127.676243848772, "origAddr": "경상남도 함양군 마천면 강청리 산 47-1"}, {"name": "재난안전_경남_함양군자-PS-RU", "lat": 35.3918548552296, "lng": 127.653289217311, "origAddr": "경상남도 함양군 마천면 군자리 314"}, {"name": "재난안전_경남_함양백무동-PS-RU", "lat": 35.3559636252689, "lng": 127.644857808205, "origAddr": "경상남도 함양군 마천면 삼정리 437"}, {"name": "재난안전_경남_함양마천-PS-RU", "lat": 35.407169034318, "lng": 127.685517322176, "origAddr": "경상남도 함양군 마천면 의탄리 970-13"}, {"name": "재난안전_경남_함양창원-PS-ICS", "lat": 35.4084450493559, "lng": 127.695958755045, "origAddr": "경상남도 함양군 마천면 창원리 303-1"}, {"name": "재난안전_경남_함양추성마을-PS-RU", "lat": 35.3898136606271, "lng": 127.696746977192, "origAddr": "경상남도 함양군 마천면 추성리 394-11"}, {"name": "재난안전_경남_함양수동2-PS-RU", "lat": 35.5990366597764, "lng": 127.801423210887, "origAddr": "경상남도 함양군 수동면 내백리 415-3"}, {"name": "재난안전_경남_함양상백3-PS-RU", "lat": 35.61081192208, "lng": 127.810789985492, "origAddr": "경상남도 함양군 수동면 상백리 산 18-1"}, {"name": "재난안전_경남_함양우명2-PS-RU", "lat": 35.52209943141, "lng": 127.78774961991, "origAddr": "경상남도 함양군 수동면 우명리 산 101-17"}, {"name": "재난안전_경남_함양죽산-PS-RU", "lat": 35.5644264768333, "lng": 127.842062924372, "origAddr": "경상남도 함양군 수동면 죽산리 산 98-10"}, {"name": "재난안전_경남_함양하교-PS-RU", "lat": 35.5451645637612, "lng": 127.821139677132, "origAddr": "경상남도 함양군 수동면 하교리 121-1"}, {"name": "재난안전_경남_함양화산3-PS-RU", "lat": 35.5316613438587, "lng": 127.808155847218, "origAddr": "경상남도 함양군 수동면 화산리 537-4"}, {"name": "재난안전_경남_함양안의-PS-RU", "lat": 35.640313842383, "lng": 127.802627881586, "origAddr": "경상남도 함양군 안의면 교북리 586"}, {"name": "재난안전_경남_함양당본2-PS-RU", "lat": 35.6269139539124, "lng": 127.804795630435, "origAddr": "경상남도 함양군 안의면 당본리 634"}, {"name": "재난안전_경남_함양대대-PS-RU", "lat": 35.6632750537594, "lng": 127.823601016839, "origAddr": "경상남도 함양군 안의면 대대리 산 20"}, {"name": "재난안전_경남_함양상원2-PS-RU", "lat": 35.7016701482649, "lng": 127.75449444389, "origAddr": "경상남도 함양군 안의면 상원리 1136-2"}, {"name": "재난안전_경남_함양상원-PS-RU", "lat": 35.6729826051405, "lng": 127.775199958199, "origAddr": "경상남도 함양군 안의면 상원리 733-1"}, {"name": "재난안전_경남_함양월림2-PS-RU", "lat": 35.6345452266137, "lng": 127.796097411138, "origAddr": "경상남도 함양군 안의면 월림리 309"}, {"name": "재난안전_경남_함양월림-PS-RU", "lat": 35.6255326266757, "lng": 127.783918970367, "origAddr": "경상남도 함양군 안의면 월림리 854-1"}, {"name": "재난안전_경남_함양하원-PS-RU", "lat": 35.6639881555052, "lng": 127.790874257635, "origAddr": "경상남도 함양군 안의면 하원리 1152-2"}, {"name": "재난안전_경남_함양국계-PS-RU", "lat": 35.4858371709669, "lng": 127.797432370972, "origAddr": "경상남도 함양군 유림면 국계리 485"}, {"name": "재난안전_경남_함양대궁-PS-RU", "lat": 35.5002772437356, "lng": 127.808359249273, "origAddr": "경상남도 함양군 유림면 대궁리 185-1"}, {"name": "재난안전_경남_함양대궁리-PS-ICS", "lat": 35.5046027636321, "lng": 127.801780210363, "origAddr": "경상남도 함양군 유림면 대궁리 산 20-1"}, {"name": "재난안전_경남_함양유림-PS-RU", "lat": 35.4628631849492, "lng": 127.781696032758, "origAddr": "경상남도 함양군 유림면 서주리 704"}, {"name": "재난안전_경남_함양유평4-PS-RU", "lat": 35.4613713841181, "lng": 127.7587711257, "origAddr": "경상남도 함양군 유림면 유평리 1055-2"}, {"name": "재난안전_경남_산청생초-PS-RU", "lat": 35.4781678845331, "lng": 127.837533478297, "origAddr": "경상남도 산청군 생초면 갈전리 551-1"}, {"name": "재난안전_경남_산청노은-PS-RU", "lat": 35.5158677286844, "lng": 127.844535173231, "origAddr": "경상남도 산청군 생초면 노은리 657"}, {"name": "재난안전_경남_산청생초노은-PS-ICS", "lat": 35.5087191588095, "lng": 127.839346492789, "origAddr": "경상남도 산청군 생초면 노은리 산 7-1"}, {"name": "재난안전_경남_산청신연5-PS-RU", "lat": 35.4807798286469, "lng": 127.854790839133, "origAddr": "경상남도 산청군 생초면 신연리 산66-51"}, {"name": "재난안전_경남_산청향양5-PS-RU", "lat": 35.5525244585473, "lng": 127.856147546352, "origAddr": "경상남도 산청군 생초면 향양리 산 30-4"}, {"name": "재난안전_경남_산청내곡-PS-RU", "lat": 35.4751970876893, "lng": 127.876160732526, "origAddr": "경상남도 산청군 오부면 내곡리 371-6"}, {"name": "재난안전_경남_산청내곡2-PS-RU", "lat": 35.4851823103812, "lng": 127.878197703299, "origAddr": "경상남도 산청군 오부면 내곡리 산6-4"}, {"name": "재난안전_경남_산청오부대현-PS-ICS", "lat": 35.5037897940758, "lng": 127.913190408393, "origAddr": "경상남도 산청군 오부면 대현리 산 57-4"}, {"name": "재난안전_경남_산청오부방곡2-PS-ICS", "lat": 35.4691516655914, "lng": 127.879470363678, "origAddr": "경상남도 산청군 오부면 방곡리 471"}, {"name": "재난안전_경남_산청양촌-PS-RU", "lat": 35.4487676622063, "lng": 127.874697826097, "origAddr": "경상남도 산청군 오부면 양촌리 6-1"}, {"name": "재난안전_경남_산청오부-PS-RU", "lat": 35.4987322575449, "lng": 127.894854893301, "origAddr": "경상남도 산청군 오부면 오전리 103"}, {"name": "재난안전_경남_산청차황-PS-RU", "lat": 35.4636189832907, "lng": 127.950220415418, "origAddr": "경상남도 산청군 차황면 신기리 산13-3"}, {"name": "재난안전_경남_산청장박2-PS-RU", "lat": 35.5113637064444, "lng": 127.949631987776, "origAddr": "경상남도 산청군 차황면 장박리 35"}, {"name": "재난안전_경남_산청장박3-PS-ICS", "lat": 35.5107349984104, "lng": 127.932800316963, "origAddr": "경상남도 산청군 차황면 장박리 산 96-8"}];
var STORAGE_KEY = '재난망_7월_5주_재난망_done';
var total = STATIONS.length;

var map = L.map('map').setView([35.51504, 127.80661], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

function makeIcon(done) {
  var bg = done ? '#2e7d32' : '#bf360c';
  var emoji = done ? '✅' : '🚨';
  return L.divIcon({
    className: '',
    html: '<div style="background:' + bg + ';color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.4);border:2px solid white;">' + emoji + '</div>',
    iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-15]
  });
}

var doneSet = {};
try { doneSet = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}

function saveDone() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(doneSet)); } catch(e) {}
  updateProgress();
}

function updateProgress() {
  var cnt = Object.keys(doneSet).filter(function(k){ return doneSet[k]; }).length;
  document.getElementById('progress-badge').textContent = '완료 ' + cnt + '/' + total;
}

var markers = [];

STATIONS.forEach(function(s, idx) {
  var done = !!doneSet[idx];
  var m = L.marker([s.lat, s.lng], {icon: makeIcon(done)}).addTo(map);

  function buildPopup() {
    var isDone = !!doneSet[idx];
    var enc = encodeURIComponent(s.name);
    var navUrl = 'https://map.kakao.com/link/to/' + enc + ',' + s.lat + ',' + s.lng;
    var viewUrl = 'https://map.kakao.com/link/map/' + enc + ',' + s.lat + ',' + s.lng;
    var doneBtn = isDone
      ? '<button class="popup-btn btn-undone" onclick="toggleDone(' + idx + ')">↩️ 완료 취소</button>'
      : '<button class="popup-btn btn-done" onclick="toggleDone(' + idx + ')">✅ 완료</button>';
    return '<div class="popup-name">' + (isDone ? '✅ ' : '🚨 ') + s.name + '</div>' +
      '<div class="popup-addr">📌 ' + s.origAddr + '</div>' +
      '<div class="popup-btns">' +
      '<a class="popup-btn btn-nav" href="' + navUrl + '" target="_blank">🚗 경로안내</a>' +
      '<a class="popup-btn btn-view" href="' + viewUrl + '" target="_blank">🗺️ 지도보기</a>' +
      '</div>' + doneBtn;
  }

  m.bindPopup(buildPopup, {maxWidth:270});
  markers.push({marker:m, station:s, visible:true, idx:idx});
});

window.toggleDone = function(idx) {
  doneSet[idx] = !doneSet[idx];
  saveDone();
  var e = markers[idx];
  e.marker.setIcon(makeIcon(!!doneSet[idx]));
  e.marker.openPopup();
  renderSideList(markers.filter(function(x){ return x.visible; }));
};

updateProgress();

function fitAll() {
  var v = markers.filter(function(e){ return e.visible; });
  if (!v.length) return;
  map.fitBounds(L.featureGroup(v.map(function(e){ return e.marker; })).getBounds().pad(0.1));
}
fitAll();

function filterMarkers(kw) {
  kw = kw.trim().toLowerCase();
  var shown = [];
  markers.forEach(function(e) {
    var m = !kw || e.station.name.toLowerCase().indexOf(kw)>=0 || e.station.origAddr.toLowerCase().indexOf(kw)>=0;
    e.visible = m;
    if (m) { e.marker.addTo(map); shown.push(e); } else map.removeLayer(e.marker);
  });
  renderSideList(shown);
  if (kw && shown.length) fitAll();
}

function renderSideList(list) {
  document.getElementById('side-header').textContent = '목록 (' + list.length + ')';
  var sl = document.getElementById('side-list');
  sl.innerHTML = '';
  list.forEach(function(e) {
    var isDone = !!doneSet[e.idx];
    var d = document.createElement('div');
    d.className = 'side-item' + (isDone ? ' done' : '');
    d.innerHTML =
      '<div class="si-check">' + (isDone ? '✅' : '⬜') + '</div>' +
      '<div class="si-text">' +
        '<div class="si-name' + (isDone ? ' done' : '') + '">' + e.station.name + '</div>' +
        '<div class="si-addr">' + e.station.origAddr + '</div>' +
      '</div>';
    d.onclick = function() { map.setView([e.station.lat, e.station.lng], 17); e.marker.openPopup(); };
    sl.appendChild(d);
  });
}
renderSideList(markers);
</script>
</body>
</html>
