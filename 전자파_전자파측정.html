<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>전자파측정 전자파측정 지도</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
    #header {
      background: linear-gradient(135deg,#b71c1c,#e53935);
      color:white; padding:12px 16px;
      display:flex; align-items:center; gap:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.3);
    }
    #header h1 { font-size:16px; font-weight:bold; flex:1; }
    #progress-badge {
      background:rgba(255,255,255,0.2);
      border-radius:12px; padding:3px 10px; font-size:12px; white-space:nowrap;
    }
    #toolbar {
      background:white; padding:8px 12px;
      display:flex; gap:8px; align-items:center;
      border-bottom:1px solid #e0e0e0;
    }
    #search-input {
      flex:1; padding:8px 14px;
      border:1.5px solid #ffcdd2; border-radius:20px;
      font-size:14px; outline:none;
    }
    #search-input:focus { border-color:#e53935; }
    #btn-fit {
      background:#e53935; color:white; border:none;
      border-radius:16px; padding:8px 12px;
      font-size:13px; cursor:pointer; white-space:nowrap;
    }
    #app-container { display:flex; height:calc(100vh - 108px); }
    #map { flex:1; height:100%; }
    #side-panel {
      width:300px; background:white;
      border-left:1px solid #e0e0e0;
      overflow-y:auto; display:flex; flex-direction:column;
    }
    .side-header {
      padding:10px 14px; background:#ffebee;
      font-size:12px; font-weight:bold; color:#c62828;
      position:sticky; top:0; z-index:1;
    }
    .side-item {
      padding:10px 14px; border-bottom:1px solid #f0f0f0;
      cursor:pointer; transition:background 0.15s;
      display:flex; align-items:flex-start; gap:8px;
    }
    .side-item:hover { background:#ffebee; }
    .side-item.done { background:#f1fdf4; }
    .si-check { font-size:18px; padding-top:1px; }
    .si-text { flex:1; }
    .si-name { font-size:13px; font-weight:bold; color:#b71c1c; word-break:break-all; }
    .si-name.done { color:#888; text-decoration:line-through; }
    .si-addr { font-size:11px; color:#888; margin-top:2px; }
    .si-note { font-size:11px; color:#e53935; margin-top:3px; font-style:italic; }
    @media(max-width:767px) {
      #side-panel { display:none; }
      #map { height:calc(100vh - 108px); width:100%; }
    }
    /* 마커 라벨 */
    .marker-label {
      background:white; border:1.5px solid #e53935; border-radius:4px;
      padding:1px 5px; font-size:11px; font-weight:bold; color:#b71c1c;
      white-space:nowrap; box-shadow:0 1px 4px rgba(0,0,0,0.2);
    }
    /* 팝업 */
    .popup-name { font-size:14px; font-weight:bold; color:#b71c1c; margin-bottom:4px; word-break:break-all; }
    .popup-addr { font-size:12px; color:#555; margin-bottom:6px; }
    .popup-note {
      background:#fff8f8; border-left:3px solid #e53935;
      padding:6px 8px; font-size:12px; color:#333;
      border-radius:0 4px 4px 0; margin-bottom:8px;
      white-space:pre-wrap; word-break:break-all;
    }
    .popup-note-empty { font-size:12px; color:#bbb; margin-bottom:8px; font-style:italic; }
    .popup-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .popup-btn {
      flex:1; padding:7px 4px; border-radius:6px;
      font-size:12px; font-weight:bold;
      text-decoration:none; text-align:center; display:block;
      cursor:pointer; border:none;
    }
    .btn-nav { background:#FFCD00; color:#333; }
    .btn-view { background:#b71c1c; color:white; }
    .btn-done { background:#2e7d32; color:white; width:100%; margin-top:4px; }
    .btn-undone { background:#e0e0e0; color:#555; width:100%; margin-top:4px; }
  </style>
</head>
<body>
<div id="header">
  <span style="font-size:18px">📻</span>
  <h1>전자파측정 전자파측정</h1>
  <a href="./index.html" style="color:rgba(255,255,255,0.8);text-decoration:none;font-size:13px;white-space:nowrap;">← 목록</a>
  <div id="progress-badge">완료 0/17</div>
</div>
<div id="toolbar">
  <input id="search-input" type="search" placeholder="명칭 또는 주소 검색..." oninput="filterMarkers(this.value)">
  <button id="btn-fit" onclick="fitAll()">전체보기</button>
</div>
<div id="app-container">
  <div id="map"></div>
  <div id="side-panel">
    <div class="side-header" id="side-header">목록 (17)</div>
    <div id="side-list"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var STATIONS = [{"name": "공동망_SKG하동금남면복지회관AAU_1_2", "lat": 34.9505144081674, "lng": 127.85911016191, "origAddr": "경상남도 하동군 금남면 제먼당길 금남면복지회관", "note": "ㅇ상시출입가능"}, {"name": "SKL하동금남면복지회관LRRU_F1", "lat": 34.9505144081674, "lng": 127.85911016191, "origAddr": "경상남도 하동군 금남면 제먼당길 금남면복지회관", "note": "상시출입가능"}, {"name": "SKL하동금남면복지회관LRRU_F2", "lat": 34.9505144081674, "lng": 127.85911016191, "origAddr": "경상남도 하동군 금남면 제먼당길 금남면복지회관", "note": "상시출입가능"}, {"name": "SKG진주봉곡무지개PRU_1", "lat": 35.1960997407122, "lng": 128.075372678704, "origAddr": "경상남도 진주시 북장대로64번길 20, 일반  (봉곡동)", "note": "1F 카운터 통보 후 출입가능/장비 옥상"}, {"name": "SKG진주평거15PRU_1", "lat": 35.174345230597, "lng": 128.067697040702, "origAddr": "경상남도 진주시 신평공원길57번길 10-3, 일반  (평거동)", "note": "상시출입가능/장비 옥탑"}, {"name": "SKG진주인사4PRU_1", "lat": 35.1918377275545, "lng": 128.076116905084, "origAddr": "경상남도 진주시 진주성로27번길 18, 일반  (인사동)", "note": "출입문 비밀번호 확인 후 출입가능/장비 옥탑"}, {"name": "SKG진주봉곡3PRU_1", "lat": 35.1932360586292, "lng": 128.074040009904, "origAddr": "경상남도 진주시 북장대로 35, 일반  (봉곡동)", "note": "1F 공동현관문 비번 확인 후 출입가능/장비 옥탑"}, {"name": "SKG진주하대10PRU_1", "lat": 35.1921726118571, "lng": 128.113337672587, "origAddr": "경상남도 진주시 하대로34번길 23, 일반  (하대동)", "note": "상시출입가능/장비 옥탑"}, {"name": "SKG진주인사3PRU_1", "lat": 35.1921448453725, "lng": 128.075422006851, "origAddr": "경상남도 진주시 북장대로22번길 8, 일반  (인사동)", "note": "상시출입가능/장비 옥탑"}, {"name": "SKG진주하대8PRU_1", "lat": 35.1901193622622, "lng": 128.119730990095, "origAddr": "경상남도 진주시 도동로223번길 23-1, 일반  (하대동)", "note": "상시출입가능/장비 옥탑"}, {"name": "SKG진주수정PRU_1", "lat": 35.1989979713851, "lng": 128.087049681564, "origAddr": "경상남도 진주시 향교로50번길 2, 일반  (수정동)", "note": "상시출입가능/장비 옥탑"}, {"name": "SKG진주하대16PRU_1", "lat": 35.1915744658174, "lng": 128.120008200481, "origAddr": "경상남도 진주시 도동로239번길 19-1, 일반  (하대동)", "note": "1F 출입문 비번 확인 후 출입가능/장비 옥탑"}, {"name": "SKG진주들말흥한PRU_1", "lat": 35.1751361891432, "lng": 128.065069142479, "origAddr": "경상남도 진주시 석갑로 45, 관리사무소(평거동, 들말흥한타운)", "note": "2F 유치원 경유 후 출입가능/장비 옥상"}, {"name": "공동망_SKG의령서동5AAU_1-2", "lat": 35.3210981202367, "lng": 128.259064828485, "origAddr": "경상남도 의령군 의령읍 서동리 1026 ", "note": "상시출입가능/나대지"}, {"name": "SKL의령서동5LRRU_F2_이설", "lat": 35.3210981202367, "lng": 128.259064828485, "origAddr": "경상남도 의령군 의령읍 서동리 1026 ", "note": "상시출입가능/나대지"}, {"name": "SKL의령서동5LRRU_F5_이설", "lat": 35.3210981202367, "lng": 128.259064828485, "origAddr": "경상남도 의령군 의령읍 서동리 1026 ", "note": "상시출입가능/나대지"}, {"name": "공동망_SKG의령중리마을AAU_1_2", "lat": 35.2936780707541, "lng": 128.249764684086, "origAddr": "경상남도 의령군 의령읍 중리로1길 5-14", "note": "상시 출입가능/건물옥상"}];
var STORAGE_KEY = '전자파_전자파측정_done';
var total = STATIONS.length;

var map = L.map('map').setView([35.17672, 128.08695], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

function makeIcon(done) {
  var bg = done ? '#2e7d32' : '#b71c1c';
  var emoji = done ? '✅' : '📻';
  return L.divIcon({
    className: '',
    html: '<div style="background:' + bg + ';color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.4);border:2px solid white;">' + emoji + '</div>',
    iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-15]
  });
}

var doneSet = {};
try { doneSet = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}

function saveDone() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(doneSet)); } catch(e) {}
  updateProgress();
}

function updateProgress() {
  var cnt = Object.keys(doneSet).filter(function(k){ return doneSet[k]; }).length;
  document.getElementById('progress-badge').textContent = '완료 ' + cnt + '/' + total;
}

var markers = [];

STATIONS.forEach(function(s, idx) {
  var done = !!doneSet[idx];
  var m = L.marker([s.lat, s.lng], {icon: makeIcon(done)}).addTo(map);

  // 이름 항상 표시 (permanent tooltip)
  m.bindTooltip(s.name, {
    permanent: true,
    direction: 'top',
    offset: [0, -16],
    className: 'marker-label'
  });

  function buildPopup() {
    var isDone = !!doneSet[idx];
    var enc = encodeURIComponent(s.name);
    var navUrl = 'https://map.kakao.com/link/to/' + enc + ',' + s.lat + ',' + s.lng;
    var viewUrl = 'https://map.kakao.com/link/map/' + enc + ',' + s.lat + ',' + s.lng;
    var noteHtml = s.note
      ? '<div class="popup-note">📝 ' + s.note + '</div>'
      : '<div class="popup-note-empty">특이사항 없음</div>';
    var doneBtn = isDone
      ? '<button class="popup-btn btn-undone" onclick="toggleDone(' + idx + ')">↩️ 완료 취소</button>'
      : '<button class="popup-btn btn-done" onclick="toggleDone(' + idx + ')">✅ 완료</button>';
    return '<div class="popup-name">' + (isDone ? '✅ ' : '📻 ') + s.name + '</div>' +
      '<div class="popup-addr">📌 ' + s.origAddr + '</div>' +
      noteHtml +
      '<div class="popup-btns">' +
      '<a class="popup-btn btn-nav" href="' + navUrl + '" target="_blank">🚗 경로안내</a>' +
      '<a class="popup-btn btn-view" href="' + viewUrl + '" target="_blank">🗺️ 지도보기</a>' +
      '</div>' + doneBtn;
  }

  m.bindPopup(buildPopup, {maxWidth:280});
  markers.push({marker:m, station:s, visible:true, idx:idx});
});

window.toggleDone = function(idx) {
  doneSet[idx] = !doneSet[idx];
  saveDone();
  var e = markers[idx];
  e.marker.setIcon(makeIcon(!!doneSet[idx]));
  e.marker.openPopup();
  renderSideList(markers.filter(function(x){ return x.visible; }));
};

updateProgress();

function fitAll() {
  var v = markers.filter(function(e){ return e.visible; });
  if (!v.length) return;
  map.fitBounds(L.featureGroup(v.map(function(e){ return e.marker; })).getBounds().pad(0.1));
}
fitAll();

function filterMarkers(kw) {
  kw = kw.trim().toLowerCase();
  var shown = [];
  markers.forEach(function(e) {
    var m = !kw
      || e.station.name.toLowerCase().indexOf(kw)>=0
      || e.station.origAddr.toLowerCase().indexOf(kw)>=0
      || e.station.note.toLowerCase().indexOf(kw)>=0;
    e.visible = m;
    if (m) { e.marker.addTo(map); shown.push(e); } else map.removeLayer(e.marker);
  });
  renderSideList(shown);
  if (kw && shown.length) fitAll();
}

function renderSideList(list) {
  document.getElementById('side-header').textContent = '목록 (' + list.length + ')';
  var sl = document.getElementById('side-list');
  sl.innerHTML = '';
  list.forEach(function(e) {
    var isDone = !!doneSet[e.idx];
    var d = document.createElement('div');
    d.className = 'side-item' + (isDone ? ' done' : '');
    var noteEl = e.station.note ? '<div class="si-note">📝 ' + e.station.note + '</div>' : '';
    d.innerHTML =
      '<div class="si-check">' + (isDone ? '✅' : '⬜') + '</div>' +
      '<div class="si-text">' +
        '<div class="si-name' + (isDone ? ' done' : '') + '">' + e.station.name + '</div>' +
        '<div class="si-addr">' + e.station.origAddr + '</div>' +
        noteEl +
      '</div>';
    d.onclick = function() { map.setView([e.station.lat, e.station.lng], 17); e.marker.openPopup(); };
    sl.appendChild(d);
  });
}
renderSideList(markers);
</script>
</body>
</html>
