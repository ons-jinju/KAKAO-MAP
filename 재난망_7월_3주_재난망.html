<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>7월 3주 재난망 재난망 지도</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
    #header {
      background: linear-gradient(135deg,#bf360c,#e64a19);
      color:white; padding:12px 16px;
      display:flex; align-items:center; gap:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.3);
    }
    #header h1 { font-size:16px; font-weight:bold; flex:1; }
    #progress-badge {
      background:rgba(255,255,255,0.2);
      border-radius:12px; padding:3px 10px; font-size:12px; white-space:nowrap;
    }
    #toolbar {
      background:white; padding:8px 12px;
      display:flex; gap:8px; align-items:center;
      border-bottom:1px solid #e0e0e0;
    }
    #search-input {
      flex:1; padding:8px 14px;
      border:1.5px solid #ffccbc; border-radius:20px;
      font-size:14px; outline:none;
    }
    #search-input:focus { border-color:#e64a19; }
    #btn-fit {
      background:#e64a19; color:white; border:none;
      border-radius:16px; padding:8px 12px;
      font-size:13px; cursor:pointer; white-space:nowrap;
    }
    #app-container { display:flex; height:calc(100vh - 108px); }
    #map { flex:1; height:100%; }
    #side-panel {
      width:300px; background:white;
      border-left:1px solid #e0e0e0;
      overflow-y:auto; display:flex; flex-direction:column;
    }
    .side-header {
      padding:10px 14px; background:#fbe9e7;
      font-size:12px; font-weight:bold; color:#bf360c;
      position:sticky; top:0; z-index:1;
    }
    .side-item {
      padding:10px 14px; border-bottom:1px solid #f0f0f0;
      cursor:pointer; transition:background 0.15s;
      display:flex; align-items:center; gap:8px;
    }
    .side-item:hover { background:#fbe9e7; }
    .side-item.done { background:#f1fdf4; }
    .si-text { flex:1; }
    .si-name { font-size:13px; font-weight:bold; color:#bf360c; word-break:break-all; }
    .si-name.done { color:#888; text-decoration:line-through; }
    .si-addr { font-size:11px; color:#888; margin-top:2px; }
    .si-check { font-size:18px; }
    @media(max-width:767px) {
      #side-panel { display:none; }
      #map { height:calc(100vh - 108px); width:100%; }
    }
    .popup-name { font-size:13px; font-weight:bold; color:#bf360c; margin-bottom:4px; word-break:break-all; }
    .popup-addr { font-size:12px; color:#555; margin-bottom:8px; }
    .popup-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .popup-btn {
      flex:1; padding:7px 4px; border-radius:6px;
      font-size:12px; font-weight:bold;
      text-decoration:none; text-align:center; display:block;
      cursor:pointer; border:none;
    }
    .btn-nav { background:#FFCD00; color:#333; }
    .btn-view { background:#bf360c; color:white; }
    .btn-done { background:#2e7d32; color:white; width:100%; margin-top:4px; }
    .btn-undone { background:#e0e0e0; color:#555; width:100%; margin-top:4px; }
  </style>
</head>
<body>
<div id="header">
  <span style="font-size:18px">🚨</span>
  <h1>7월 3주 재난망 재난망</h1>
  <a href="./index.html" style="color:rgba(255,255,255,0.8);text-decoration:none;font-size:13px;white-space:nowrap;">← 목록</a>
  <div id="progress-badge">완료 0/32</div>
</div>
<div id="toolbar">
  <input id="search-input" type="search" placeholder="호출명칭 또는 주소 검색..." oninput="filterMarkers(this.value)">
  <button id="btn-fit" onclick="fitAll()">전체보기</button>
</div>
<div id="app-container">
  <div id="map"></div>
  <div id="side-panel">
    <div class="side-header" id="side-header">목록 (32)</div>
    <div id="side-list"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var STATIONS = [{"name": "재난안전_경남_거창개명-PS-RU", "lat": 35.8503401952097, "lng": 127.836418834325, "origAddr": "경상남도 거창군 고제면 개명리 1925"}, {"name": "재난안전_경남_거창농산리-PS-RU", "lat": 35.817613071237, "lng": 127.859567779504, "origAddr": "경상남도 거창군 고제면 농산리 1189-3"}, {"name": "재난안전_경남_거창농산-PS-RU", "lat": 35.8049871450803, "lng": 127.870920131281, "origAddr": "경상남도 거창군 고제면 농산리 464"}, {"name": "재난안전_경남_거창고제-PS-RU", "lat": 35.8954815697696, "lng": 127.871407789317, "origAddr": "경상남도 거창군 고제면 봉계리 739"}, {"name": "재난안전_경남_거창봉산3-PS-RU", "lat": 35.8520617534609, "lng": 127.878725954838, "origAddr": "경상남도 거창군 고제면 봉산리 809-2"}, {"name": "재난안전_경남_거창북상-PS-RU", "lat": 35.7726663725034, "lng": 127.813147179755, "origAddr": "경상남도 거창군 북상면 농산리 187-1"}, {"name": "재난안전_경남_거창북상소정-PS-RU", "lat": 35.812756107421, "lng": 127.813046103686, "origAddr": "경상남도 거창군 북상면 소정리 1823"}, {"name": "재난안전_경남_거창소정5-PS-RU", "lat": 35.8310490724093, "lng": 127.818564218632, "origAddr": "경상남도 거창군 북상면 소정리 69"}, {"name": "재난안전_경남_거창갈계-PS-RU", "lat": 35.7985159268355, "lng": 127.814238769927, "origAddr": "경상남도 거창군 북상면 송계로 970"}, {"name": "재난안전_경남_거창월성-PS-RU", "lat": 35.7696562170407, "lng": 127.716285403438, "origAddr": "경상남도 거창군 북상면 월성리 1772-1"}, {"name": "재난안전_경남_거창북상2-PS-RU", "lat": 35.7710208470845, "lng": 127.745651156437, "origAddr": "경상남도 거창군 북상면 월성리 267-1"}, {"name": "재난안전_경남_거창창선-PS-RU", "lat": 35.7654043266092, "lng": 127.778864527776, "origAddr": "경상남도 거창군 북상면 창선리 150-3"}, {"name": "재난안전_경남_거창신원-PS-RU", "lat": 35.5686709067764, "lng": 127.929923488337, "origAddr": "경상남도 거창군 신원면 과정리 441"}, {"name": "재난안전_경남_거창구사-PS-RU", "lat": 35.5726501964878, "lng": 127.942680453361, "origAddr": "경상남도 거창군 신원면 구사리 산82-2"}, {"name": "재난안전_경남_거창덕산1-2-PS-RU", "lat": 35.5754418173701, "lng": 127.872954019692, "origAddr": "경상남도 거창군 신원면 덕산리 1475-5"}, {"name": "재난안전_경남_거창수원-PS-RU", "lat": 35.5805047001639, "lng": 127.980551611686, "origAddr": "경상남도 거창군 신원면 수원리 424-3"}, {"name": "재난안전_경남_거창양지-PS-RU", "lat": 35.6019001987977, "lng": 127.955404283717, "origAddr": "경상남도 거창군 신원면 양지리 1118-3"}, {"name": "재난안전_경남_거창양지2-PS-RU", "lat": 35.5841327555224, "lng": 127.962419767909, "origAddr": "경상남도 거창군 신원면 양지리 432"}, {"name": "재난안전_경남_거창와룡3-PS-RU", "lat": 35.5309697595599, "lng": 127.931182523211, "origAddr": "경상남도 거창군 신원면 와룡리 1415-2"}, {"name": "재난안전_경남_거창청수-P-PS-RU", "lat": 35.5683256958734, "lng": 127.901789068619, "origAddr": "경상남도 거창군 신원면 청수리 367-2"}, {"name": "재난안전_경남_거창당산-PS-RU", "lat": 35.7548633838129, "lng": 127.855781214966, "origAddr": "경상남도 거창군 위천면 당산리 821"}, {"name": "재난안전_경남_거창모동-PS-RU", "lat": 35.7763791071019, "lng": 127.866197651855, "origAddr": "경상남도 거창군 위천면 모동리 440-1"}, {"name": "재난안전_경남_거창장기-PS-RU", "lat": 35.755036368617, "lng": 127.833742011356, "origAddr": "경상남도 거창군 위천면 장기리 388-30"}, {"name": "재난안전_경남_함양경벽88올림픽-PS-RU", "lat": 35.5381888724748, "lng": 127.65463938332, "origAddr": "경상남도 함양군 백전면 경백리 산35-6"}, {"name": "재난안전_경남_함양백운3-PS-RU", "lat": 35.5953669118106, "lng": 127.663136946465, "origAddr": "경상남도 함양군 백전면 백운리 산 87-8"}, {"name": "재난안전_경남_함양백전-PS-RU", "lat": 35.5600693568547, "lng": 127.638461323905, "origAddr": "경상남도 함양군 백전면 양백리 735"}, {"name": "재난안전_경남_함양오천-PS-RU", "lat": 35.530261890981, "lng": 127.647225701642, "origAddr": "경상남도 함양군 백전면 오천리 690-6"}, {"name": "재난안전_경남_함양운산4-PS-RU", "lat": 35.58820712997, "lng": 127.63225379235, "origAddr": "경상남도 함양군 백전면 운산리 604-1"}, {"name": "재난안전_경남_함양평정-PS-RU", "lat": 35.5436067132179, "lng": 127.643394430349, "origAddr": "경상남도 함양군 백전면 평정리 209-1"}, {"name": "재난안전_경남_함양병곡-PS-RU", "lat": 35.5400695097354, "lng": 127.705151651751, "origAddr": "경상남도 함양군 병곡면 도천리 524-4"}, {"name": "재난안전_경남_함양도천88올림픽-PS-RU", "lat": 35.5431382131308, "lng": 127.692597664466, "origAddr": "경상남도 함양군 병곡면 도천리 653"}, {"name": "재난안전_경남_함양송평-PS-RU", "lat": 35.5295239727103, "lng": 127.678376524001, "origAddr": "경상남도 함양군 병곡면 송평리 628-3"}];
var STORAGE_KEY = '재난망_7월_3주_재난망_done';
var total = STATIONS.length;

var map = L.map('map').setView([35.67434, 127.80640], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

function makeIcon(done) {
  var bg = done ? '#2e7d32' : '#bf360c';
  var emoji = done ? '✅' : '🚨';
  return L.divIcon({
    className: '',
    html: '<div style="background:' + bg + ';color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.4);border:2px solid white;">' + emoji + '</div>',
    iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-15]
  });
}

var doneSet = {};
try { doneSet = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}

function saveDone() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(doneSet)); } catch(e) {}
  updateProgress();
}

function updateProgress() {
  var cnt = Object.keys(doneSet).filter(function(k){ return doneSet[k]; }).length;
  document.getElementById('progress-badge').textContent = '완료 ' + cnt + '/' + total;
}

var markers = [];

STATIONS.forEach(function(s, idx) {
  var done = !!doneSet[idx];
  var m = L.marker([s.lat, s.lng], {icon: makeIcon(done)}).addTo(map);

  function buildPopup() {
    var isDone = !!doneSet[idx];
    var enc = encodeURIComponent(s.name);
    var navUrl = 'https://map.kakao.com/link/to/' + enc + ',' + s.lat + ',' + s.lng;
    var viewUrl = 'https://map.kakao.com/link/map/' + enc + ',' + s.lat + ',' + s.lng;
    var doneBtn = isDone
      ? '<button class="popup-btn btn-undone" onclick="toggleDone(' + idx + ')">↩️ 완료 취소</button>'
      : '<button class="popup-btn btn-done" onclick="toggleDone(' + idx + ')">✅ 완료</button>';
    return '<div class="popup-name">' + (isDone ? '✅ ' : '🚨 ') + s.name + '</div>' +
      '<div class="popup-addr">📌 ' + s.origAddr + '</div>' +
      '<div class="popup-btns">' +
      '<a class="popup-btn btn-nav" href="' + navUrl + '" target="_blank">🚗 경로안내</a>' +
      '<a class="popup-btn btn-view" href="' + viewUrl + '" target="_blank">🗺️ 지도보기</a>' +
      '</div>' + doneBtn;
  }

  m.bindPopup(buildPopup, {maxWidth:270});
  markers.push({marker:m, station:s, visible:true, idx:idx});
});

window.toggleDone = function(idx) {
  doneSet[idx] = !doneSet[idx];
  saveDone();
  var e = markers[idx];
  e.marker.setIcon(makeIcon(!!doneSet[idx]));
  e.marker.openPopup();
  renderSideList(markers.filter(function(x){ return x.visible; }));
};

updateProgress();

function fitAll() {
  var v = markers.filter(function(e){ return e.visible; });
  if (!v.length) return;
  map.fitBounds(L.featureGroup(v.map(function(e){ return e.marker; })).getBounds().pad(0.1));
}
fitAll();

function filterMarkers(kw) {
  kw = kw.trim().toLowerCase();
  var shown = [];
  markers.forEach(function(e) {
    var m = !kw || e.station.name.toLowerCase().indexOf(kw)>=0 || e.station.origAddr.toLowerCase().indexOf(kw)>=0;
    e.visible = m;
    if (m) { e.marker.addTo(map); shown.push(e); } else map.removeLayer(e.marker);
  });
  renderSideList(shown);
  if (kw && shown.length) fitAll();
}

function renderSideList(list) {
  document.getElementById('side-header').textContent = '목록 (' + list.length + ')';
  var sl = document.getElementById('side-list');
  sl.innerHTML = '';
  list.forEach(function(e) {
    var isDone = !!doneSet[e.idx];
    var d = document.createElement('div');
    d.className = 'side-item' + (isDone ? ' done' : '');
    d.innerHTML =
      '<div class="si-check">' + (isDone ? '✅' : '⬜') + '</div>' +
      '<div class="si-text">' +
        '<div class="si-name' + (isDone ? ' done' : '') + '">' + e.station.name + '</div>' +
        '<div class="si-addr">' + e.station.origAddr + '</div>' +
      '</div>';
    d.onclick = function() { map.setView([e.station.lat, e.station.lng], 17); e.marker.openPopup(); };
    sl.appendChild(d);
  });
}
renderSideList(markers);
</script>
</body>
</html>
