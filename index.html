      display:flex; align-items:center; gap:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.3);
    }
    #header h1 { font-size:17px; font-weight:bold; }
    #count-badge {

      border-radius:12px; padding:3px 10px; font-size:12px;
    }
    #toolbar {
      background:white; padding:10px 12px;
      display:flex; gap:8px; align-items:center;
      border-bottom:1px solid #e0e0e0;
    }
    #search-input {
      flex:1; padding:8px 14px;
      border:1.5px solid #c5cae9; border-radius:20px;
      font-size:14px; outline:none;
    }
    #search-input:focus { border-color:#3949ab; }
    #btn-fit {
      background:#3949ab; color:white; border:none;
      border-radius:16px; padding:8px 14px;
      font-size:13px; cursor:pointer; white-space:nowrap;
    }
    #app-container { display:flex; height:calc(100vh - 110px); }
    #map { flex:1; height:100%; }
    #side-panel {
      width:300px; background:white;
      border-left:1px solid #e0e0e0;
      overflow-y:auto; display:flex; flex-direction:column;
    }
    .side-header {
      padding:10px 14px; background:#e8eaf6;
      font-size:12px; font-weight:bold; color:#3949ab;
      position:sticky; top:0; z-index:1;
    }
    .side-item {
      padding:10px 14px; border-bottom:1px solid #f0f0f0;
      cursor:pointer; transition:background 0.15s;
    }
    .side-item:hover { background:#e8eaf6; }
    .si-name { font-size:13px; font-weight:bold; color:#1a237e; word-break:break-all; }
    .si-addr { font-size:11px; color:#888; margin-top:2px; }
    @media(max-width:767px) {
      #side-panel { display:none; }
      #map { height:calc(100vh - 110px); width:100%; }
    }
    .popup-name { font-size:13px; font-weight:bold; color:#1a237e; margin-bottom:5px; word-break:break-all; }
    .popup-addr { font-size:12px; color:#555; margin-bottom:8px; }
    .popup-btns { display:flex; gap:6px; }
    .popup-btn {
      flex:1; padding:7px 4px; border-radius:6px;
      font-size:12px; font-weight:bold;
      text-decoration:none; text-align:center; display:block;
    }
    .btn-nav { background:#FFCD00; color:#333; }
    .btn-view { background:#1a237e; color:white; }
  </style>

  maxZoom: 19
}).addTo(map);

var icon = L.divIcon({
  className: '',
  html: '<div style="background:#1a237e;color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,0.4);border:2px solid white;">📡</div>',
  iconSize:[26,26], iconAnchor:[13,13], popupAnchor:[0,-14]
});

var markers = [];

STATIONS.forEach(function(s) {
  var m = L.marker([s.lat, s.lng], {icon: icon}).addTo(map);
  var enc = encodeURIComponent(s.name);
  var navUrl = 'https://map.kakao.com/link/to/' + enc + ',' + s.lat + ',' + s.lng;
  var viewUrl = 'https://map.kakao.com/link/map/' + enc + ',' + s.lat + ',' + s.lng;
  var popup =
    '<div class="popup-name">📡 ' + s.name + '</div>' +
    '<div class="popup-addr">📌 ' + s.origAddr + '</div>' +
    '<div class="popup-btns">' +
    '<a class="popup-btn btn-nav" href="' + navUrl + '" target="_blank">🚗 경로안내</a>' +
    '<a class="popup-btn btn-view" href="' + viewUrl + '" target="_blank">🗺️ 지도보기</a>' +
    '</div>';
  m.bindPopup(popup, {maxWidth:270});
  markers.push({marker:m, station:s, visible:true});
});

function fitAll() {
  var visible = markers.filter(function(e){ return e.visible; });
  if (!visible.length) return;
  var group = L.featureGroup(visible.map(function(e){ return e.marker; }));
  map.fitBounds(group.getBounds().pad(0.1));
}
fitAll();

function filterMarkers(kw) {
  kw = kw.trim().toLowerCase();
  var shown = [];
  markers.forEach(function(e) {
    var m = !kw || e.station.name.toLowerCase().indexOf(kw) >= 0 || e.station.origAddr.toLowerCase().indexOf(kw) >= 0;
    e.visible = m;
    if (m) { e.marker.addTo(map); shown.push(e); }
    else map.removeLayer(e.marker);
  });
  renderSideList(shown);
  if (kw && shown.length) fitAll();
}

function renderSideList(list) {
  document.getElementById('side-header').textContent = '목록 (' + list.length + ')';
  var sl = document.getElementById('side-list');
  sl.innerHTML = '';
  list.forEach(function(e) {
    var d = document.createElement('div');
    d.className = 'side-item';
    d.innerHTML = '<div class="si-name">' + e.station.name + '</div><div class="si-addr">' + e.station.origAddr + '</div>';
    d.onclick = function() {
      map.setView([e.station.lat, e.station.lng], 17);
      e.marker.openPopup();
    };
    sl.appendChild(d);
  });
}
renderSideList(markers);
