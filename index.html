<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>무선국 위치 지도</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }

    #header {
      background: linear-gradient(135deg, #1a237e, #3949ab);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 10;
    }
    #header h1 { font-size: 17px; font-weight: bold; }
    #count-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 12px;
    }

    #toolbar {
      background: white;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #e0e0e0;
    }
    #search-input {
      flex: 1;
      padding: 8px 14px;
      border: 1.5px solid #c5cae9;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }
    #search-input:focus { border-color: #3949ab; }
    #btn-fit {
      background: #3949ab;
      color: white;
      border: none;
      border-radius: 16px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    #status-bar {
      background: #fff8e1;
      border-bottom: 1px solid #ffe082;
      padding: 5px 14px;
      font-size: 12px;
      color: #795548;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #progress-bar-wrap {
      flex: 1;
      background: #ffe082;
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
    }
    #progress-bar { height: 100%; background: #f9a825; width: 0%; transition: width 0.2s; }

    #app-container { display: flex; height: calc(100vh - 122px); }
    #map { flex: 1; height: 100%; }

    #side-panel {
      width: 300px;
      background: white;
      border-left: 1px solid #e0e0e0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .side-header {
      padding: 10px 14px;
      background: #e8eaf6;
      font-size: 12px;
      font-weight: bold;
      color: #3949ab;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .side-item {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .side-item:hover { background: #e8eaf6; }
    .si-name { font-size: 13px; font-weight: bold; color: #1a237e; }
    .si-addr { font-size: 11px; color: #888; margin-top: 2px; }

    @media (max-width: 767px) {
      #side-panel { display: none; }
      #app-container { display: block; }
      #map { height: calc(100vh - 122px); width: 100%; }
    }

    .iw-wrap { padding: 12px 14px; min-width: 220px; max-width: 270px; font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
    .iw-name { font-size: 13px; font-weight: bold; color: #1a237e; margin-bottom: 5px; line-height: 1.4; word-break: break-all; }
    .iw-addr { font-size: 12px; color: #555; margin-bottom: 10px; line-height: 1.4; }
    .iw-btns { display: flex; gap: 6px; }
    .iw-btn { flex: 1; padding: 7px 4px; border-radius: 6px; font-size: 12px; font-weight: bold; text-decoration: none; text-align: center; display: block; }
    .iw-btn-nav { background: #FFCD00; color: #333; }
    .iw-btn-view { background: #1a237e; color: white; }
  </style>
</head>
<body>

<div id="header">
  <span style="font-size:20px">📡</span>
  <h1>무선국 위치 지도</h1>
  <div id="count-badge">로딩 중...</div>
</div>

<div id="toolbar">
  <input id="search-input" type="search" placeholder="호출명칭 또는 주소 검색..." oninput="filterMarkers(this.value)">
  <button id="btn-fit" onclick="fitAll()">전체보기</button>
</div>

<div id="status-bar">
  <span id="status-text">📡 지도 준비 중...</span>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
</div>

<div id="app-container">
  <div id="map"></div>
  <div id="side-panel">
    <div class="side-header" id="side-header">목록 (0)</div>
    <div id="side-list"></div>
  </div>
</div>

<script>
var map, geocoder, activeInfowindow = null;
var allMarkers = [], geocodeDone = 0, geocodeFailed = 0;

function setStatus(msg) { document.getElementById('status-text').textContent = msg; }

// stations.json 파일 읽기
async function loadStations() {
  setStatus('📂 데이터 불러오는 중...');
  var res = await fetch('./stations.json');
  if (!res.ok) throw new Error('stations.json 없음 (' + res.status + ')');
  return await res.json();
}

async function initMap() {
  var container = document.getElementById('map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(35.1796, 128.1076),
    level: 9
  });
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
  map.addControl(new kakao.maps.MapTypeControl(), kakao.maps.ControlPosition.TOPRIGHT);
  kakao.maps.event.addListener(map, 'click', function() {
    if (activeInfowindow) { activeInfowindow.close(); activeInfowindow = null; }
  });
  geocoder = new kakao.maps.services.Geocoder();

  try {
    var stations = await loadStations();
    setStatus('✅ ' + stations.length + '개 항목 읽기 완료 — 지도에 표시 중...');
    geocodeAll(stations);
  } catch(e) {
    setStatus('❌ 데이터 로딩 실패: ' + e.message);
  }
}

function geocodeAll(stations) {
  var total = stations.length;
  var iw = new kakao.maps.InfoWindow({ zIndex: 1 });

  function next(i) {
    if (i >= total) return;
    var s = stations[i];
    geocoder.addressSearch(s.address, function(result, status) {
      if (status === kakao.maps.services.Status.OK) {
        var pos = new kakao.maps.LatLng(result[0].y, result[0].x);
        var marker = new kakao.maps.Marker({ position: pos, map: map, title: s.name });
        var entry = { marker: marker, station: s, lat: result[0].y, lng: result[0].x, visible: true };
        allMarkers.push(entry);
        kakao.maps.event.addListener(marker, 'click', (function(e) {
          return function() { showInfo(e, iw); };
        })(entry));
      } else {
        geocodeFailed++;
      }
      geocodeDone++;
      var pct = Math.round(geocodeDone / total * 100);
      document.getElementById('progress-bar').style.width = pct + '%';
      setStatus('📍 위치 변환 중... ' + geocodeDone + ' / ' + total);

      if (geocodeDone === total) {
        document.getElementById('progress-bar').style.background = '#66bb6a';
        setStatus('✅ ' + allMarkers.length + '개 위치 표시 완료' +
          (geocodeFailed > 0 ? ' (변환 실패: ' + geocodeFailed + '개)' : ''));
        document.getElementById('count-badge').textContent = allMarkers.length + '개';
        renderSideList(allMarkers);
        fitAll();
      }
      setTimeout(function() { next(i + 1); }, 80);
    });
  }
  next(0);
}

function showInfo(entry, iw) {
  if (activeInfowindow) activeInfowindow.close();
  var encName = encodeURIComponent(entry.station.name);
  var navUrl  = 'https://map.kakao.com/link/to/' + encName + ',' + entry.lat + ',' + entry.lng;
  var viewUrl = 'https://map.kakao.com/link/map/' + encName + ',' + entry.lat + ',' + entry.lng;
  iw.setContent(
    '<div class="iw-wrap">' +
    '<div class="iw-name">📡 ' + entry.station.name + '</div>' +
    '<div class="iw-addr">📌 ' + entry.station.origAddr + '</div>' +
    '<div class="iw-btns">' +
    '<a class="iw-btn iw-btn-nav" href="' + navUrl + '" target="_blank">🚗 경로안내</a>' +
    '<a class="iw-btn iw-btn-view" href="' + viewUrl + '" target="_blank">🗺️ 지도보기</a>' +
    '</div></div>'
  );
  iw.open(map, entry.marker);
  activeInfowindow = iw;
  map.panTo(entry.marker.getPosition());
}

function fitAll() {
  var visible = allMarkers.filter(function(e) { return e.visible; });
  if (!visible.length) return;
  var bounds = new kakao.maps.LatLngBounds();
  visible.forEach(function(e) { bounds.extend(e.marker.getPosition()); });
  map.setBounds(bounds);
}

function filterMarkers(kw) {
  kw = kw.trim().toLowerCase();
  allMarkers.forEach(function(e) {
    var m = !kw || e.station.name.toLowerCase().indexOf(kw) >= 0 ||
      e.station.origAddr.toLowerCase().indexOf(kw) >= 0;
    e.visible = m;
    e.marker.setVisible(m);
  });
  renderSideList(allMarkers.filter(function(e) { return e.visible; }));
  if (kw) fitAll();
}

function renderSideList(list) {
  document.getElementById('side-header').textContent = '목록 (' + list.length + ')';
  var sl = document.getElementById('side-list');
  sl.innerHTML = '';
  list.forEach(function(e) {
    var d = document.createElement('div');
    d.className = 'side-item';
    d.innerHTML = '<div class="si-name">' + e.station.name + '</div>' +
      '<div class="si-addr">' + e.station.origAddr + '</div>';
    d.onclick = function() {
      map.setCenter(e.marker.getPosition());
      map.setLevel(4);
      var iw2 = new kakao.maps.InfoWindow({ zIndex: 1 });
      showInfo(e, iw2);
    };
    sl.appendChild(d);
  });
}
</script>

<script type="text/javascript"
  src="//dapi.kakao.com/v2/maps/sdk.js?appkey=9e477b69128d827b63adc096ddfa5e59&libraries=services&autoload=false">
</script>
<script>
kakao.maps.load(function() { initMap(); });
</script>

</body>
</html>
