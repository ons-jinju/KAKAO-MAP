var map = L.map('map').setView([35.1800, 128.0900], 13);

}).addTo(map);
var icon = L.divIcon({
  className: '',
  html: '<div style="background:#1a237e;color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,0.4);border:2px solid white;">📡</div>',
  iconSize:[26,26], iconAnchor:[13,13], popupAnchor:[0,-14]
});
var markers = [];
STATIONS.forEach(function(s) {
  var m = L.marker([s.lat, s.lng], {icon: icon}).addTo(map);
  var enc = encodeURIComponent(s.name);
  var navUrl = 'https://map.kakao.com/link/to/' + enc + ',' + s.lat + ',' + s.lng;
  var viewUrl = 'https://map.kakao.com/link/map/' + enc + ',' + s.lat + ',' + s.lng;
  var popup =
    '<div class="popup-name">📡 ' + s.name + '</div>' +
    '<div class="popup-addr">📌 ' + s.origAddr + '</div>' +
    '<div class="popup-btns">' +

    '</div>';
  m.bindPopup(popup, {maxWidth:270});
  markers.push({marker:m, station:s, visible:true});
});
function fitAll() {
  var v = markers.filter(function(e){ return e.visible; });
  if (!v.length) return;
  map.fitBounds(L.featureGroup(v.map(function(e){ return e.marker; })).getBounds().pad(0.1));
}
fitAll();
function filterMarkers(kw) {
  kw = kw.trim().toLowerCase();
  var shown = [];
  markers.forEach(function(e) {
    var m = !kw || e.station.name.toLowerCase().indexOf(kw)>=0 || e.station.origAddr.toLowerCase().indexOf(kw)>=0;
    e.visible = m;
    if (m) { e.marker.addTo(map); shown.push(e); } else map.removeLayer(e.marker);
  });
  renderSideList(shown);
  if (kw && shown.length) fitAll();
}
function renderSideList(list) {
  document.getElementById('side-header').textContent = '목록 (' + list.length + ')';
  var sl = document.getElementById('side-list');
  sl.innerHTML = '';
  list.forEach(function(e) {
    var d = document.createElement('div');
    d.className = 'side-item';
    d.innerHTML = '<div class="si-name">' + e.station.name + '</div><div class="si-addr">' + e.station.origAddr + '</div>';
    d.onclick = function() { map.setView([e.station.lat, e.station.lng], 17); e.marker.openPopup(); };
    sl.appendChild(d);
  });
}
renderSideList(markers);
</script>
