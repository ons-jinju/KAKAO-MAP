<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>무선국 위치 지도</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f0f0f0; }

    #header {
      background: linear-gradient(135deg, #1a237e, #3949ab);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: relative;
      z-index: 10;
    }
    #header h1 { font-size: 17px; font-weight: bold; letter-spacing: -0.3px; }
    #header .count-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 12px;
    }

    #toolbar {
      background: white;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #e0e0e0;
      position: relative;
      z-index: 10;
    }
    #search-input {
      flex: 1;
      padding: 8px 14px;
      border: 1.5px solid #c5cae9;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search-input:focus { border-color: #3949ab; }
    #btn-fit {
      background: #3949ab;
      color: white;
      border: none;
      border-radius: 16px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    #btn-fit:hover { background: #283593; }

    #status-bar {
      background: #fff8e1;
      border-bottom: 1px solid #ffe082;
      padding: 5px 14px;
      font-size: 12px;
      color: #795548;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #progress-bar-wrap {
      flex: 1;
      background: #ffe082;
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
    }
    #progress-bar { height: 100%; background: #f9a825; width: 0%; transition: width 0.2s; }

    #map {
      width: 100%;
      height: calc(100vh - 120px);
    }

    /* 인포윈도우 스타일 */
    .iw-wrap {
      padding: 12px 14px;
      min-width: 230px;
      max-width: 280px;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }
    .iw-name {
      font-size: 13px;
      font-weight: bold;
      color: #1a237e;
      margin-bottom: 5px;
      line-height: 1.4;
      word-break: break-all;
    }
    .iw-addr {
      font-size: 12px;
      color: #555;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .iw-btns {
      display: flex;
      gap: 6px;
    }
    .iw-btn {
      flex: 1;
      padding: 7px 4px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      text-decoration: none;
      text-align: center;
      display: block;
    }
    .iw-btn-nav {
      background: #FFCD00;
      color: #333;
    }
    .iw-btn-view {
      background: #1a237e;
      color: white;
    }

    /* 사이드 패널 (PC) */
    @media (min-width: 768px) {
      #app-container { display: flex; height: calc(100vh - 120px); }
      #map { flex: 1; height: 100%; }
      #side-panel {
        width: 300px;
        background: white;
        border-left: 1px solid #e0e0e0;
        overflow-y: auto;
        display: block;
      }
      .side-item {
        padding: 10px 14px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
        transition: background 0.15s;
      }
      .side-item:hover { background: #e8eaf6; }
      .side-item .si-name { font-size: 13px; font-weight: bold; color: #1a237e; }
      .side-item .si-addr { font-size: 11px; color: #888; margin-top: 2px; }
      .side-header {
        padding: 10px 14px;
        background: #e8eaf6;
        font-size: 12px;
        font-weight: bold;
        color: #3949ab;
        position: sticky;
        top: 0;
        z-index: 1;
      }
    }
    @media (max-width: 767px) {
      #side-panel { display: none; }
      #app-container { display: block; }
    }
  </style>
</head>
<body>

<div id="header">
  <span style="font-size:20px">📡</span>
  <h1>무선국 위치 지도</h1>
  <div class="count-badge" id="count-badge">로딩 중...</div>
</div>

<div id="toolbar">
  <input id="search-input" type="search" placeholder="호출명칭 또는 주소 검색..." oninput="filterMarkers(this.value)">
  <button id="btn-fit" onclick="fitAll()">전체보기</button>
</div>

<div id="status-bar">
  <span id="status-text">📍 지도 초기화 중...</span>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<div id="app-container">

var map, geocoder, activeInfowindow = null;
var allMarkers = [];       // {marker, station, visible}
var geocodeDone = 0;
var geocodeFailed = 0;

function initMap() {
  var container = document.getElementById('map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(35.1796, 128.1076),
    level: 9
  });

  // 지도 컨트롤
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
  map.addControl(new kakao.maps.MapTypeControl(), kakao.maps.ControlPosition.TOPRIGHT);

  geocoder = new kakao.maps.services.Geocoder();

  // 지도 클릭시 인포윈도우 닫기
  kakao.maps.event.addListener(map, 'click', function() {
    if (activeInfowindow) { activeInfowindow.close(); activeInfowindow = null; }
  });

  geocodeAll();
}

function geocodeAll() {
  var total = STATIONS.length;
  var infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

  function next(i) {
    if (i >= total) return;
    var s = STATIONS[i];
    geocoder.addressSearch(s.address, function(result, status) {
      if (status === kakao.maps.services.Status.OK) {
        var pos = new kakao.maps.LatLng(result[0].y, result[0].x);
        var marker = new kakao.maps.Marker({ position: pos, map: map, title: s.name });
        var entry = { marker: marker, station: s, lat: result[0].y, lng: result[0].x, visible: true };
        allMarkers.push(entry);

        kakao.maps.event.addListener(marker, 'click', (function(e, iw) {
          return function() { showInfo(e, iw); };
        })(entry, infowindow));
      } else {
        geocodeFailed++;
      }

      geocodeDone++;
      var pct = Math.round(geocodeDone / total * 100);
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('status-text').textContent =
        '📍 위치 변환 중... ' + geocodeDone + ' / ' + total;

      if (geocodeDone === total) {
        onAllDone();
      }
      setTimeout(function(){ next(i + 1); }, 80);
    });
  }
  next(0);
}

function onAllDone() {
  var ok = allMarkers.length;
  document.getElementById('status-text').textContent =
    '✅ ' + ok + '개 위치 표시 완료' + (geocodeFailed > 0 ? ' (변환 실패: ' + geocodeFailed + '개)' : '');
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-bar').style.background = '#66bb6a';
  document.getElementById('count-badge').textContent = ok + '개';
  renderSideList(allMarkers);
  fitAll();
}

function showInfo(entry, iw) {
  if (activeInfowindow) activeInfowindow.close();
  var lat = entry.lat, lng = entry.lng;
  var encName = encodeURIComponent(entry.station.name);
  var navUrl  = 'https://map.kakao.com/link/to/' + encName + ',' + lat + ',' + lng;
  var viewUrl = 'https://map.kakao.com/link/map/' + encName + ',' + lat + ',' + lng;
  var content = '<div class="iw-wrap">'
    + '<div class="iw-name">📡 ' + entry.station.name + '</div>'
    + '<div class="iw-addr">📌 ' + entry.station.address + '</div>'
    + '<div class="iw-btns">'
    + '<a class="iw-btn iw-btn-nav" href="' + navUrl + '" target="_blank">🚗 경로안내</a>'
    + '<a class="iw-btn iw-btn-view" href="' + viewUrl + '" target="_blank">🗺️ 지도보기</a>'
    + '</div></div>';
  iw.setContent(content);
  iw.open(map, entry.marker);
  activeInfowindow = iw;
  map.panTo(entry.marker.getPosition());
}

function fitAll() {
  var visible = allMarkers.filter(function(e){ return e.visible; });
  if (visible.length === 0) return;
  var bounds = new kakao.maps.LatLngBounds();
  visible.forEach(function(e){ bounds.extend(e.marker.getPosition()); });
  map.setBounds(bounds);
}

function filterMarkers(keyword) {
  keyword = keyword.trim().toLowerCase();
  var count = 0;
  allMarkers.forEach(function(e) {
    var match = !keyword
      || e.station.name.toLowerCase().indexOf(keyword) >= 0
      || e.station.address.toLowerCase().indexOf(keyword) >= 0;
    e.visible = match;
    e.marker.setVisible(match);
    if (match) count++;
  });
  renderSideList(allMarkers.filter(function(e){ return e.visible; }));
  if (keyword) fitAll();
}

function renderSideList(list) {
  var header = document.getElementById('side-header');
  var sideList = document.getElementById('side-list');
  header.textContent = '목록 (' + list.length + ')';
  sideList.innerHTML = '';
  list.forEach(function(e) {
    var div = document.createElement('div');
    div.className = 'side-item';
    div.innerHTML = '<div class="si-name">' + e.station.name + '</div>'
      + '<div class="si-addr">' + e.station.address + '</div>';
    div.onclick = function() {
      map.setCenter(e.marker.getPosition());
      map.setLevel(4);
      e.marker.setVisible(true);
      // 클릭시 인포윈도우 열기
      var iw = new kakao.maps.InfoWindow({zIndex:1});
      showInfo(e, iw);
    };
    sideList.appendChild(div);
  });
}
</script>
